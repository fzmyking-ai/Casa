<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub da Casa</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --primary-variant: #3700b3;
            --secondary-color: #03dac6;
            --error-color: #cf6679;
            --text-color: #e1e1e1;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 80px;
        }

        header {
            background-color: var(--surface-color);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            color: var(--primary-color);
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .house-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }

        .header-btn:hover { color: var(--primary-color); }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .hub-card {
            background-color: var(--surface-color);
            border-radius: 16px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.4s ease-out forwards;
        }

        .hub-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            background-color: #252525;
        }

        .hub-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--secondary-color);
        }
        
        .hub-card.compras i { color: #bb86fc; } 
        .hub-card.tarefas i { color: #03dac6; } 
        .hub-card.financas i { color: #cf6679; } 
        .hub-card.membros i { color: #ffb86c; } 

        .hub-card span {
            font-size: 1.1rem;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .swal2-popup {
            background: var(--surface-color) !important;
            color: var(--text-color) !important;
            border-radius: 15px !important;
        }
        .swal2-input {
            color: var(--text-color) !important;
            background: var(--bg-color) !important;
            border: 1px solid #333 !important;
        }
        .swal2-input::placeholder { color: var(--text-muted); }
        
        #main-app { display: none; }
        
        .member-list { text-align: left; margin-top: 15px; background: var(--bg-color); padding: 10px; border-radius: 8px; }
        .member-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #333; align-items: center; }
    </style>
</head>
<body>

    <div id="main-app">
        <header>
            <div style="width: 32px;"></div> 
            <h1 id="header-title">
                <span><i class="fas fa-home"></i> Hub da Casa</span>
                <span class="house-subtitle" id="house-name-display">Carregando...</span>
            </h1>
            <button class="header-btn" id="btn-settings"><i class="fas fa-cog"></i></button>
        </header>

        <div class="container" id="hub-container">
            <a href="listadecompras.html" class="hub-card compras">
                <i class="fas fa-shopping-basket"></i>
                <span>Lista de Compras</span>
            </a>
            
            <a href="tarefas.html" class="hub-card tarefas">
                <i class="fas fa-clipboard-list"></i>
                <span>Tarefas da Casa</span>
            </a>
            
            <a href="erro.html" class="hub-card financas">
                <i class="fas fa-wallet"></i>
                <span>Finanças</span>
            </a>
            
            <a href="erro.html" class="hub-card membros">
                <i class="fas fa-users"></i>
                <span>Mural de Avisos</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAI-dHKJYJVOHknaQCWaNsKlRiLTmdWNTg",
            authDomain: "lista-de-compras-e744f.firebaseapp.com",
            databaseURL: "https://lista-de-compras-e744f-default-rtdb.firebaseio.com",
            projectId: "lista-de-compras-e744f",
            storageBucket: "lista-de-compras-e744f.firebasestorage.app",
            messagingSenderId: "839320575020",
            appId: "1:839320575020:web:b58a4470506688a1418589",
            measurementId: "G-G17ZN6YWGZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messaging = getMessaging(app);

        let userName = localStorage.getItem('userName');
        let currentHouseCode = localStorage.getItem('houseCode');
        let houseData = null;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            if (type === 'click') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.05);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'success') {
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, now);
                osc1.frequency.setValueAtTime(659.25, now + 0.1);
                gain1.gain.setValueAtTime(0, now);
                gain1.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start(now);
                osc1.stop(now + 0.3);
            } else if (type === 'delete') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.15);
            }
        }

        async function configurarNotificacoesPush(code) {
            if (!("Notification" in window)) {
                console.log("Este navegador não suporta notificações de sistema.");
                return;
            }

            try {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
                    
                    const tokenAtual = await getToken(messaging, {
                        serviceWorkerRegistration: registration,
                        vapidKey: "INSIRA_SUA_CHAVE_VAPID_AQUI"
                    });

                    if (tokenAtual && userName) {
                        await set(ref(db, `casas/${code}/tokens_notificacao/${userName}`), tokenAtual);
                        console.log("Token FCM updated successfully.");
                    }
                }
            } catch (error) {
                console.error("Erro ao configurar Cloud Messaging:", error);
            }
        }

        async function initApp() {
            if (!userName) {
                const { value: name } = await Swal.fire({
                    title: 'Bem-vindo ao Hub!',
                    text: 'Qual o seu nome?',
                    input: 'text',
                    allowOutsideClick: false,
                    confirmButtonText: 'Entrar',
                    confirmButtonColor: '#bb86fc',
                    inputValidator: (value) => {
                        if (!value) return 'Você precisa digitar um nome!';
                        if (/[.$#[\]]/.test(value)) return 'O nome não pode conter pontos ou símbolos especiais';
                    }
                });
                if (name) {
                    userName = name.trim();
                    localStorage.setItem('userName', userName);
                    playSound('success');
                }
            }

            if (!currentHouseCode) {
                await showHouseSelection();
            } else {
                loadHouse(currentHouseCode);
            }
        }

        async function showHouseSelection() {
            const result = await Swal.fire({
                title: `Olá, ${userName}!`,
                text: 'Você precisa de uma casa activa para aceder ao Hub.',
                showCancelButton: true,
                confirmButtonText: '<i class="fas fa-home"></i> Criar Casa',
                cancelButtonText: '<i class="fas fa-sign-in-alt"></i> Entrar com Código',
                confirmButtonColor: '#bb86fc',
                cancelButtonColor: '#03dac6',
                allowOutsideClick: false
            });

            if (result.isConfirmed) {
                await createNewHouse();
            } else if (result.dismiss === Swal.DismissReason.cancel) {
                await joinHouse();
            }
        }

        async function createNewHouse() {
            const { value: houseName } = await Swal.fire({
                title: 'Nova Casa',
                input: 'text',
                inputPlaceholder: 'Nome da Casa (ex: Minha Casa)',
                showCancelButton: true,
                confirmButtonColor: '#bb86fc',
                inputValidator: (value) => {
                    if (!value) return 'A casa precisa de um nome!';
                }
            });

            if (!houseName) {
                await showHouseSelection();
                return;
            }

            try {
                const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                
                await set(ref(db, `casas/${code}`), {
                    nome: houseName.trim(),
                    dono: userName,
                    membros: { [userName]: true }
                });

                currentHouseCode = code;
                localStorage.setItem('houseCode', code);
                playSound('success');
                
                await Swal.fire({
                    title: 'Casa Criada!',
                    html: `O código da sua casa é: <b style="color:var(--secondary-color); font-size:1.4rem;">${code}</b>`,
                    icon: 'success',
                    confirmButtonColor: '#bb86fc'
                });
                
                loadHouse(code);
            } catch (error) {
                console.error("Erro Firebase:", error);
                await Swal.fire({
                    title: 'Erro de Permissão',
                    text: 'Não foi possível salvar no Firebase. Verifique as Regras do Banco de Dados.',
                    icon: 'error'
                });
                await showHouseSelection();
            }
        }

        async function joinHouse() {
            const { value: codeInput } = await Swal.fire({
                title: 'Entrar em uma Casa',
                input: 'text',
                inputPlaceholder: 'Digite o código da casa',
                showCancelButton: true,
                confirmButtonColor: '#03dac6',
                inputValidator: (value) => {
                    if (!value) return 'O código não pode ser vazio!';
                }
            });

            if (!codeInput) {
                await showHouseSelection();
                return;
            }

            const code = codeInput.trim().toUpperCase();

            try {
                const houseRef = ref(db, `casas/${code}`);
                const snapshot = await get(houseRef);
                
                if (snapshot.exists()) {
                    await update(ref(db, `casas/${code}/membros`), {
                        [userName]: true
                    });
                    
                    currentHouseCode = code;
                    localStorage.setItem('houseCode', currentHouseCode);
                    playSound('success');
                    loadHouse(currentHouseCode);
                } else {
                    await Swal.fire('Não encontrada', 'Nenhuma casa foi encontrada com este código.', 'error');
                    await showHouseSelection();
                }
            } catch (error) {
                console.error("Erro Firebase:", error);
                await Swal.fire({
                    title: 'Erro de Conexão',
                    text: 'Falha ao buscar dados no Firebase.',
                    icon: 'error'
                });
                await showHouseSelection();
            }
        }

        function loadHouse(code) {
            document.getElementById('main-app').style.display = 'block';
            configurarNotificacoesPush(code);

            onValue(ref(db, `casas/${code}`), (snapshot) => {
                if (!snapshot.exists()) {
                    localStorage.removeItem('houseCode');
                    currentHouseCode = null;
                    document.getElementById('main-app').style.display = 'none';
                    Swal.fire('Aviso', 'Esta casa foi excluída pelo proprietário.', 'info').then(() => {
                        window.location.reload();
                    });
                    return;
                }
                
                houseData = snapshot.val();
                document.getElementById('house-name-display').innerText = `${houseData.nome} (Cód: ${code})`;
                
                if (!houseData.membros || !houseData.membros[userName]) {
                    localStorage.removeItem('houseCode');
                    Swal.fire('Aviso', 'Você foi removido desta casa.', 'warning').then(() => window.location.reload());
                }
            });
            
            document.querySelectorAll('.hub-card').forEach(card => {
                card.addEventListener('click', () => playSound('click'));
            });
        }

        document.getElementById('btn-settings').addEventListener('click', () => {
            playSound('click');
            const isOwner = houseData.dono === userName;
            
            let htmlContent = `
                <p>Código para convidar: <b>${currentHouseCode}</b></p>
                <div class="member-list">
                    <b>Membros:</b><br>
                    ${Object.keys(houseData.membros).map(m => `
                        <div class="member-item">
                            <span>${m} ${m === houseData.dono ? '(Dono)' : ''}</span>
                            ${isOwner && m !== userName ? `<button class="icon-btn delete" onclick="window.removeMember('${m}')" style="font-size:0.9rem; padding:0; background:none; border:none; color:var(--error-color); cursor:pointer;"><i class="fas fa-times"></i></button>` : ''}
                        </div>
                    `).join('')}
                </div>
                ${isOwner ? `
                <div style="margin-top: 15px;">
                    <button onclick="Swal.close(); window.deleteHouse()" style="background-color: var(--error-color); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold; margin-top: 10px;">
                        <i class="fas fa-trash-alt"></i> Sair e Excluir a Casa
                    </button>
                </div>
                ` : ''}
            `;

            Swal.fire({
                title: 'Configurações da Casa',
                html: htmlContent,
                showDenyButton: isOwner,
                showCancelButton: true,
                confirmButtonText: isOwner ? 'Renomear Casa' : 'Sair da Casa',
                denyButtonText: isOwner ? 'Adicionar Membro' : '',
                cancelButtonText: 'Fechar',
                confirmButtonColor: isOwner ? '#bb86fc' : '#cf6679',
                denyButtonColor: '#03dac6'
            }).then((result) => {
                if (result.isConfirmed) {
                    if (isOwner) window.renameHouse();
                    else window.leaveHouse();
                } else if (result.isDenied && isOwner) {
                    window.addMemberManual();
                }
            });
        });

        window.renameHouse = async () => {
            const { value: novoNome } = await Swal.fire({
                title: 'Renomear',
                input: 'text',
                inputValue: houseData.nome,
                showCancelButton: true,
                confirmButtonColor: '#bb86fc'
            });
            if (novoNome) update(ref(db, `casas/${currentHouseCode}`), { nome: novoNome });
        };

        window.addMemberManual = async () => {
            const { value: novoMembro } = await Swal.fire({
                title: 'Adicionar Membro',
                text: 'Digite o nome exato da pessoa para adicioná-la.',
                input: 'text',
                showCancelButton: true,
                confirmButtonColor: '#bb86fc'
            });
            if (novoMembro) {
                if (/[.$#[\]]/.test(novoMembro)) {
                    Swal.fire('Nome inválido', 'O nome do membro não pode conter símbolos', 'error');
                    return;
                }
                update(ref(db, `casas/${currentHouseCode}/membros`), { [novoMembro.trim()]: true });
                playSound('success');
            }
        };

        window.removeMember = (membro) => {
            remove(ref(db, `casas/${currentHouseCode}/membros/${membro}`));
            playSound('delete');
            Swal.close();
        };

        window.leaveHouse = () => {
            remove(ref(db, `casas/${currentHouseCode}/membros/${userName}`));
            localStorage.removeItem('houseCode');
            window.location.reload();
        };

        window.deleteHouse = () => {
            Swal.fire({
                title: 'Você tem certeza?',
                text: 'Como você é o dono, sair irá EXCLUIR a casa permanentemente e remover todos os membros atuais das listas. Essa ação não pode ser desfeita!',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#cf6679',
                cancelButtonColor: '#888888',
                confirmButtonText: 'Sim, excluir casa!',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    remove(ref(db, `casas/${currentHouseCode}`));
                    localStorage.removeItem('houseCode');
                    playSound('delete');
                    window.location.reload();
                }
            });
        };

        initApp();
    </script>
</body>
</html>
